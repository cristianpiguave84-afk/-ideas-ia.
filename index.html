<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gemma AI | Ideas de Cristian</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #111; padding: 35px; border-radius: 20px; width: 380px; border: 1px solid #333; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        h1 { color: #4285F4; margin-bottom: 5px; }
        input { width: 100%; padding: 14px; margin: 20px 0; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #4285F4; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:disabled { background: #555; cursor: not-allowed; }
        #resultado { margin-top: 25px; text-align: left; }
        .idea { background: #1a1a1a; padding: 15px; margin-bottom: 12px; border-radius: 10px; border-left: 4px solid #4285F4; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Gemma AI</h1>
        <p style="color: #888;">Generador de Ideas Magistrales</p>
        <input id="tema" placeholder="¿Qué quieres crear hoy?">
        <button id="btn" onclick="generar()">GENERAR AHORA</button>
        <div id="resultado"></div>
    </div>

<script>
    // Tu token dividido para mayor seguridad
    const a = "hf_scSZJ"; 
    const b = "tvIXbfcwJPYRPMkp";
    const c = "CXCDsLYWVvYQU";
    const LLAVE = (a + b + c).trim();

    async function generar() {
        const t = document.getElementById("tema").value;
        const bnt = document.getElementById("btn");
        const res = document.getElementById("resultado");

        if(!t) return alert("Escribe un tema");

        bnt.disabled = true;
        bnt.innerText = "Pensando...";
        res.innerHTML = "Conectando con el cerebro de Google...";

        try {
            const peticion = await fetch("https://api-inference.huggingface.co/models/google/gemma-1.1-7b-it", {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${LLAVE}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ 
                    inputs: `Dame 3 ideas cortas y creativas para videos de: ${t}`,
                    parameters: { wait_for_model: true }
                })
            });

            const data = await peticion.json();

            if(peticion.status !== 200) {
                res.innerHTML = `<p style="color:#ff4444">Error ${peticion.status}: La IA está despertando, intenta en 10 segundos.</p>`;
                return;
            }

            res.innerHTML = "";
            const texto = data[0].generated_text;
            // Solo mostramos las ideas nuevas, quitando la pregunta inicial
            const ideas = texto.replace(`Dame 3 ideas cortas y creativas para videos de: ${t}`, "").trim();
            
            ideas.split("\n").filter(i => i.trim().length > 5).forEach(idea => {
                let d = document.createElement("div");
                d.className = "idea";
                d.innerText = idea.trim();
                res.appendChild(d);
            });

        } catch (e) {
            res.innerHTML = "<p style='color:#ff4444'>Error de conexión. Revisa tu internet.</p>";
        } finally {
            bnt.disabled = false;
            bnt.innerText = "GENERAR AHORA";
        }
    }
</script>
</body>
</html>
