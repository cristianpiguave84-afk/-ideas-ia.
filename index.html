<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ideas de Cristian</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.card{
background:#111;
padding:35px;
border-radius:20px;
width:380px;
border:1px solid #333;
text-align:center;
}

h1{
color:#4285F4;
}

input{
width:100%;
padding:14px;
margin:20px 0;
border-radius:10px;
border:1px solid #444;
background:#222;
color:#fff;
}

button{
width:100%;
padding:14px;
background:#4285F4;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.idea{
background:#1a1a1a;
padding:15px;
margin-bottom:10px;
border-radius:10px;
border-left:4px solid #4285F4;
font-size:14px;
}

</style>
</head>

<body>

<div class="card">

<h1>Ideas Virales</h1>

<input id="tema" placeholder="Ejemplo: comida">

<button onclick="generar()">Generar</button>

<div id="resultado"></div>

</div>

<script>

// estructuras buenas
const estructuras=[

"5 cosas que no sabías sobre {tema}",
"Los errores más comunes en {tema}",
"Probé los {tema} más raros del mundo",
"Los mejores trucos de {tema}",
"El lado oscuro de {tema}",
"Intenté aprender {tema} en un día",
"Los secretos de {tema}",
"Probé el {tema} más caro vs barato",
"Las curiosidades más raras de {tema}",
"Lo que nadie te dice de {tema}",
"Las tendencias de {tema} que están explotando",
"Los mejores {tema} de internet"

];

// palabras absurdas
const absurdas=["ropa","aire","respirar"];

function esValida(texto){

for(let p of absurdas){

if(texto.toLowerCase().includes(p)){
return false;
}

}

return true;

}

async function generar(){

const tema=document.getElementById("tema").value.trim();
const res=document.getElementById("resultado");

if(!tema){
alert("Escribe algo");
return;
}

res.innerHTML="Generando ideas...";

let ideas=[];

// generar muchas con plantillas
for(let i=0;i<20;i++){

let plantilla=estructuras[Math.floor(Math.random()*estructuras.length)];

let idea=plantilla.replace("{tema}",tema);

if(esValida(idea)){
ideas.push(idea);
}

}

// intentar usar IA
try{

const peticion=await fetch(
"https://api-inference.huggingface.co/models/google/flan-t5-large",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
inputs:`Dame 5 ideas de videos sobre ${tema}`
})
});

if(peticion.ok){

const data=await peticion.json();

if(data[0]){

let texto=data[0].generated_text.split("\n");

texto.forEach(i=>{

if(i.length>8 && esValida(i)){
ideas.push(i);
}

});

}

}

}catch(e){

console.log("IA no disponible");

}

res.innerHTML="";

ideas.slice(0,25).forEach(i=>{

let d=document.createElement("div");

d.className="idea";

d.innerText=i;

res.appendChild(d);

});

}

</script>

</body>
</html>
