<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ideas Virales IA</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:#111827;
padding:40px;
border-radius:20px;
width:430px;
text-align:center;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:none;
margin-top:20px;
margin-bottom:15px;
font-size:16px;
}

button{
padding:14px;
border:none;
background:#f97316;
color:white;
font-weight:bold;
border-radius:10px;
cursor:pointer;
width:100%;
}

.idea{
background:#1f2937;
padding:12px;
margin-top:10px;
border-radius:8px;
text-align:left;
}

</style>
</head>

<body>

<div class="card">

<h1>Generador de Ideas Virales</h1>

<input id="tema" placeholder="Ejemplo: comida, fútbol, viajes">

<button onclick="generarIdeas()">Generar Ideas</button>

<div id="resultado"></div>

</div>

<script>

// estructuras virales reales
const estructuras=[

"Probé los {tema} más raros que encontré en internet",
"Las 7 curiosidades más locas sobre {tema}",
"Intenté aprender todo sobre {tema} en 24 horas",
"Los mayores errores que la gente comete con {tema}",
"5 secretos de {tema} que casi nadie conoce",
"Probé el {tema} más caro vs el más barato",
"Así cambió mi vida después de probar {tema}",
"Los {tema} más extraños que existen",
"Lo que nadie te dice sobre {tema}",
"Intenté sobrevivir un día usando solo {tema}",
"Probando los mejores {tema} del mundo",
"Las tendencias más raras de {tema}",
"Intenté recrear los {tema} virales de TikTok",
"Los datos más sorprendentes sobre {tema}",
"Los {tema} más populares del momento",
"Probé los hacks de {tema} que encontré en internet",
"Lo peor y lo mejor de {tema}",
"Las mayores mentiras sobre {tema}",
"El lado oscuro de {tema}",
"Lo que pasaría si desapareciera el {tema}",
"Intenté vivir solo con {tema} durante un día",
"Las teorías más locas sobre {tema}",
"El ranking de los mejores {tema}",
"Las cosas más raras que encontré sobre {tema}",
"Los {tema} más famosos de internet"

];

// palabras absurdas que bloquearemos
const prohibidas=["ropa","aire","respirar","caminar","parpadear"];

// filtrar ideas tontas
function esIdeaValida(texto){

for(let palabra of prohibidas){

if(texto.toLowerCase().includes(palabra)){
return false;
}

}

return true;

}

async function generarIdeas(){

const tema=document.getElementById("tema").value.trim();
const res=document.getElementById("resultado");

if(!tema){
alert("Escribe un tema");
return;
}

res.innerHTML="Generando ideas...";

let ideas=[];

// generar muchas ideas con estructuras
for(let i=0;i<40;i++){

let plantilla=estructuras[Math.floor(Math.random()*estructuras.length)];
let idea=plantilla.replace("{tema}",tema);

if(esIdeaValida(idea)){
ideas.push(idea);
}

}

// intentar usar IA gratis
try{

const peticion=await fetch(
"https://api-inference.huggingface.co/models/google/flan-t5-large",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
inputs:`Genera 5 ideas virales de contenido sobre ${tema}`
})
});

const data=await peticion.json();

if(data && data[0]){

let texto=data[0].generated_text.split("\n");

texto.forEach(i=>{
if(i.length>10 && esIdeaValida(i)){
ideas.push(i);
}
});

}

}catch(e){

console.log("IA ocupada");

}

res.innerHTML="";

// mostrar ideas
ideas.slice(0,30).forEach(i=>{

let d=document.createElement("div");
d.className="idea";
d.innerText=i;

res.appendChild(d);

});

}

</script>

</body>
</html>
